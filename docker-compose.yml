version: '3.8'

services:
  # MongoDB service database
  mongodb:
    image: mongo:latest
    container_name: captionai-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - captionai-network
    restart: always

  # Next.js web application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: captionai-web
    ports:
      - '3000:3000'
    environment:
      # Use container internal dns resolving 'mongodb' to connect to DB
      - MONGODB_URI=mongodb://mongodb:27017/visioscribe
      - HUGGINGFACE_API_KEY=your_huggingface_api_key_here
      - HUGGINGFACE_API_BASE_URL=https://router.huggingface.co/v1
      - HUGGINGFACE_MODEL=CohereLabs/aya-vision-32b:cohere
    depends_on:
      - mongodb
    networks:
      - captionai-network
    restart: always

volumes:
  mongo-data:

networks:
  captionai-network:
    driver: bridge
